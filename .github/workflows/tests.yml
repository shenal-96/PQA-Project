name: tests

# Runs the new desktop/web app's engine parity + contract + host-bridge tests.
# The parity harness is the central correctness guard for the Streamlit -> desktop
# migration (and, later, for the Pyodide/iPad path).

on:
  push:
    branches: ["claude/**", "main"]
  pull_request:

jobs:
  pytest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]   # windows-latest is x86-64 (the target)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime deps (pinned to match production)
        run: pip install "pandas>=2.2,<3" "numpy>=1.24" pytest

      - name: Run test suite (engine parity, JSON contract, host bridge)
        run: python -m pytest tests/ -q

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        run: npm ci
        working-directory: web

      - name: Type-check (svelte-check)
        run: npm run check
        working-directory: web

      - name: Build web UI
        run: npm run build
        working-directory: web
